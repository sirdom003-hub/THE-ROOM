<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style_css/theroom.css">
    <link rel="stylesheet" href="../style_css/form.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <title>Form - The Room</title>
</head>
<body id="join-body">


    <div class="login">
        <h2>Login</h2>

        <form>
            <div class="input-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" placeholder="your@email.com" size="20" maxlength="50" required> 
            </div>

            <div class="input-group">
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="......." size="20" maxlength="10" required>
            </div>
            
            <button type="submit" class="login-button">Login</button>
        </form>

        <div class="forgot-password">
            <a id="forgot-password-link" href="forgot-password.html">forgot your password?</a>
        </div>



    </div>

    
        <div class="signup">
            <p>Don't have an account? <a id="signup-link" href="signup.html">Sign up</a></p>
        </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="../theroom_js/form.js"></script>
</body>
</html>
